<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shinsedaikan Dojo - MAUT Assessment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- PDF Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- QR Code Library -->
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-[#0f0f0f] text-gray-200 font-['Inter'] min-h-screen">

    <div class="container mx-auto px-4 py-8 max-w-5xl">
        <!-- Header -->
        <header class="flex flex-col md:flex-row items-center justify-between mb-12 bg-[#1a1a1a] p-8 rounded-2xl border border-gray-800 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 w-64 h-64 bg-red-600/5 rounded-full -mr-32 -mt-32 blur-3xl"></div>
            <div class="flex items-center gap-6 z-10">
                <img src="logo.jpg" alt="Dojo Logo" class="w-20 h-20 rounded-full border-2 border-red-600 shadow-lg shadow-red-600/20">
                <div>
                    <h1 class="text-4xl font-extrabold tracking-tight text-white uppercase">Student <span class="text-red-600">Roster</span></h1>
                    <p class="text-xs text-gray-500 font-semibold tracking-[0.2em] mt-1 uppercase">MAUT Scoring: Technique (50%), Etiquette (30%), Attendance (20%)</p>
                </div>
            </div>
            <div class="flex gap-4 mt-6 md:mt-0 z-10">
                <button onclick="openScanner()" class="flex items-center gap-2 bg-[#222] hover:bg-[#333] text-white px-6 py-3 rounded-xl font-bold transition-all border border-gray-700 uppercase text-xs tracking-widest">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
                    Scan Attendance
                </button>
                <button id="add-student-btn" class="flex items-center gap-2 bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-xl font-bold transition-all shadow-lg shadow-red-600/30 uppercase text-xs tracking-widest">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
                    Register Student
                </button>
            </div>
        </header>

        <!-- Stats & Filters -->
        <div class="flex flex-col md:flex-row gap-4 mb-8">
            <div class="flex-1 relative">
                <input type="text" id="search-input" placeholder="Search students by name or ID..." class="w-full bg-[#1a1a1a] border border-gray-800 rounded-xl py-4 pl-12 pr-4 text-white focus:outline-none focus:border-red-600 focus:ring-1 focus:ring-red-600 transition-all shadow-inner">
                <svg class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <select id="belt-filter" class="bg-[#1a1a1a] border border-gray-800 rounded-xl px-6 py-4 text-white focus:outline-none focus:border-red-600 transition-all uppercase text-xs font-bold tracking-widest">
                <option value="all">All Belts</option>
                <option value="White">White</option>
                <option value="Yellow">Yellow</option>
                <option value="Green">Green</option>
                <option value="Blue">Blue</option>
                <option value="Brown">Brown</option>
                <option value="Black">Black</option>
            </select>
            <button id="export-all-btn" class="bg-[#1a1a1a] border border-gray-800 hover:bg-[#222] text-gray-300 px-6 py-4 rounded-xl transition-all flex items-center gap-2 uppercase text-xs font-bold tracking-widest">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Report
            </button>
        </div>

        <!-- Student List Container -->
        <div id="student-list" class="grid gap-6">
            <!-- Student cards will be injected here -->
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden py-20 text-center">
            <svg class="w-16 h-16 mx-auto text-gray-700 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
            <p class="text-gray-500 text-lg">No students found.</p>
        </div>
    </div>

    <!-- Modals -->
    <div id="registration-modal" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-[#1a1a1a] w-full max-w-lg rounded-3xl border border-gray-800 shadow-2xl overflow-hidden animate-modal-in">
            <div class="p-8 border-b border-gray-800 flex justify-between items-center">
                <h2 id="modal-title" class="text-2xl font-bold text-white uppercase tracking-tight">Register Student</h2>
                <button id="close-modal" class="text-gray-500 hover:text-white transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-8 overflow-y-auto max-h-[70vh]">
                <form id="student-form" class="space-y-6">
                    <div class="flex items-center gap-6">
                        <div class="w-20 h-20 bg-[#222] rounded-full flex items-center justify-center border-2 border-dashed border-gray-700 text-gray-600 hover:border-red-600 hover:text-red-600 transition-all cursor-pointer">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        </div>
                        <div class="flex-1">
                            <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Student Name</label>
                            <input type="text" id="student-name" required class="w-full bg-black/30 border border-gray-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-red-600 transition-colors">
                            <input type="hidden" id="student-id">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Current Belt</label>
                            <select id="student-belt" class="w-full bg-black/30 border border-gray-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-red-600 transition-colors">
                                <option>White</option>
                                <option>Yellow</option>
                                <option>Green</option>
                                <option>Blue</option>
                                <option>Brown</option>
                                <option>Black</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Main Technique</label>
                            <select id="student-technique-name" class="w-full bg-black/30 border border-gray-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-red-600 transition-colors">
                                <option>Tai no Henko</option>
                                <option>Ikkyo</option>
                                <option>Nikyo</option>
                                <option>Sankyo</option>
                                <option>Yonkyo</option>
                                <option>Kotegaeshi</option>
                                <option>Iriminage</option>
                                <option>Shihonage</option>
                            </select>
                        </div>
                    </div>

                    <div class="space-y-4 pt-4 border-t border-gray-800">
                        <div>
                            <div class="flex justify-between mb-2">
                                <label class="text-xs font-semibold text-red-600 uppercase tracking-tighter">Waza (Technique) - 50%</label>
                                <span id="waza-val" class="text-sm font-bold text-white">80</span>
                            </div>
                            <input type="range" id="technique-score" min="0" max="100" value="80" class="w-full accent-red-600 bg-gray-800 h-1.5 rounded-lg appearance-none cursor-pointer">
                        </div>
                        <div>
                            <div class="flex justify-between mb-2">
                                <label class="text-xs font-semibold text-red-600 uppercase tracking-tighter">Reigi (Etiquette) - 30%</label>
                                <span id="reigi-val" class="text-sm font-bold text-white">90</span>
                            </div>
                            <input type="range" id="etiquette-score" min="0" max="100" value="90" class="w-full accent-red-600 bg-gray-800 h-1.5 rounded-lg appearance-none cursor-pointer">
                        </div>
                        <div>
                            <div class="flex justify-between mb-2">
                                <label class="text-xs font-semibold text-red-600 uppercase tracking-tighter">Attendance - 20%</label>
                                <span id="attendance-val" class="text-sm font-bold text-white">75</span>
                            </div>
                            <input type="range" id="attendance-score" min="0" max="100" value="75" class="w-full accent-red-600 bg-gray-800 h-1.5 rounded-lg appearance-none cursor-pointer">
                        </div>
                    </div>

                    <div class="mt-8 p-4 bg-red-600/5 rounded-2xl border border-red-600/20 flex items-center justify-between">
                        <span class="text-sm text-gray-400 uppercase font-bold tracking-widest">Estimated MAUT Score</span>
                        <span id="modal-maut-score" class="text-3xl font-black text-red-600">82.5</span>
                    </div>

                    <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-red-600/20 uppercase tracking-widest mt-4">
                        Record Data
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Scanner Modal -->
    <div id="scanner-modal" class="fixed inset-0 bg-black z-[60] hidden flex-col items-center justify-center">
        <div class="w-full max-w-lg p-4">
            <div id="reader" class="rounded-3xl overflow-hidden border-2 border-red-600 shadow-2xl shadow-red-600/40"></div>
            <button onclick="stopScanner()" class="mt-8 w-full bg-white text-black font-bold py-4 rounded-xl uppercase tracking-widest">Cancel</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
